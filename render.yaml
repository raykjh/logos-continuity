services:
  - type: web
    name: logos-continuity-judge
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeployTrigger: off
    renderSubdomainPolicy: enabled
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: LOGOS_DB_PATH
        value: /app/data/logos.db
      - key: OPENAI_MODEL
        value: gpt-5.6
      - key: OPENAI_API_KEY
        sync: false
